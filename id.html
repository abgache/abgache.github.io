<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte d'identité Roblox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        #canvas {
            margin-top: 20px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Créer votre carte d'identité Roblox</h1>
    <form id="idForm">
        <label for="skin">Image du skin :</label>
        <input type="file" id="skin" accept="image/*" required><br><br>

        <label for="nom">Nom :</label>
        <input type="text" id="nom" required><br><br>

        <label for="prenom">Prénom :</label>
        <input type="text" id="prenom" required><br><br>

        <label for="date_naissance">Date de naissance :</label>
        <input type="date" id="date_naissance" required><br><br>

        <label for="taille">Taille (m) :</label>
        <input type="text" id="taille" required><br><br>

        <label for="sexe">Sexe :</label>
        <select id="sexe" required>
            <option value="Homme">Homme</option>
            <option value="Femme">Femme</option>
            <option value="Autre">Autre</option>
        </select><br><br>

        <button type="button" id="generateButton">Générer</button>
    </form>

    <canvas id="canvas" width="800" height="500"></canvas><br>
    <button id="sendButton" style="display: none;">Envoyer au webhook</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const templateImage = new Image();
        templateImage.src = "template.jpg"; // Placez votre template ici

        document.getElementById('generateButton').addEventListener('click', async () => {
            const skinInput = document.getElementById('skin');
            const nom = document.getElementById('nom').value;
            const prenom = document.getElementById('prenom').value;
            const dateNaissance = document.getElementById('date_naissance').value;
            const taille = document.getElementById('taille').value;
            const sexe = document.getElementById('sexe').value;

            if (skinInput.files.length === 0) {
                alert('Veuillez téléverser une image de skin.');
                return;
            }

            const skinFile = skinInput.files[0];
            const skinImage = new Image();
            const reader = new FileReader();

            reader.onload = function (e) {
                skinImage.src = e.target.result;

                skinImage.onload = function () {
                    // Charger le template
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

                    // Dessiner l'image de skin
                    ctx.drawImage(skinImage, 50, 200, 150, 150);

                    // Ajouter les textes
                    ctx.font = "20px Arial";
                    ctx.fillStyle = "black";
                    ctx.fillText(`Nom : ${nom}`, 250, 100);
                    ctx.fillText(`Prénom : ${prenom}`, 250, 150);
                    ctx.fillText(`Né(e) le : ${dateNaissance}`, 250, 200);
                    ctx.fillText(`Taille : ${taille}m`, 250, 250);
                    ctx.fillText(`Sexe : ${sexe}`, 250, 300);

                    // Afficher le bouton d'envoi
                    document.getElementById('sendButton').style.display = 'inline';
                };
            };

            reader.readAsDataURL(skinFile);
        });

        document.getElementById('sendButton').addEventListener('click', () => {
            const webhookURL = "https://discord.com/api/webhooks/1315009679335751720/nQcqmHMjJeZtQQFEQ4DoTZaYe3XPjSKuCm4fuUNY3TrZInEYmfRE_bmewvPiCbtmRulD";

            // Convertir le canvas en Blob (image)
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append("file", blob, "carte_identite.png");

                // Envoyer au webhook Discord
                fetch(webhookURL, {
                    method: "POST",
                    body: formData
                })
                .then(response => {
                    if (response.ok) {
                        alert("Image envoyée au webhook Discord avec succès !");
                    } else {
                        alert("Échec de l'envoi de l'image au webhook.");
                    }
                })
                .catch(error => {
                    console.error("Erreur :", error);
                    alert("Une erreur s'est produite lors de l'envoi.");
                });
            });
        });
    </script>
</body>
</html>
